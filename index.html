<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft Share</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

  <!-- NAVIGATION -->
  <nav class="navbar">
    <h1 class="logo">CraftShare</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="mypage.html">My Page</a></li>
    </ul>
  </nav>

  <!-- HERO SECTION -->
  <header class="hero">
    <h2>Join us</h2>
    <p>Share and discover crafts with tutorials and materials—all in one place.</p>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="container">

    <!-- LEFT SIDE -->
    <section class="left">
      <select class="filter">
        <option>Select</option>
        <option>Knitting</option>
        <option>Crochet</option>
        <option>Paper Crafts</option>
      </select>

      <div class="grid">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
      </div>
    </section>

    <!-- RIGHT SIDE -->
    <section class="right">
      <h3>Create Account</h3>

      <form>
        <label>Your ID</label>
        <input type="text">

        <label>Email Address</label>
        <input type="email">

        <label>Password</label>
        <input type="password">

        <label>What are you interested in?</label>
        <select>
          <option>Select</option>
          <option>Knitting</option>
          <option>Crochet</option>
          <option>Paper Crafts</option>
        </select>

        <button type="submit">SUBMIT</button>
      </form>
    </section>

  </main>

  <!-- BOTTOM GALLERY SECTION -->
  <section class="gallery-section">

    <div class="gallery-grid">
      <div class="small-card"></div>
      <div class="small-card"></div>
      <div class="small-card"></div>
      <div class="small-card"></div>

      <div class="large-card">
        <div class="arrows">
          <span>&lt;</span>
          <span>&gt;</span>
        </div>
      </div>
    </div>

    <button class="load-more">Load More</button>

  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <a href="#">Terms of Service</a>
    <a href="#">Privacy Policy</a>
    <p>© 2026 Alisa Ishisaka</p>
  </footer>

</body>
</html>
